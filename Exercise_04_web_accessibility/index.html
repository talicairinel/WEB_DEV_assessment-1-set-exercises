<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>The Wandering Photographer | Print Shop</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <a class="skip-link" href="#content">Skip to main content</a>

  <div class="page">
    <header>
      <img class="flourish" src="Media/TheDivider.png" alt="" aria-hidden="true" />
      
      <a class="cart-link" href="checkout.html" aria-label="View shopping cart, 0 items">
        <img src="Media/shopping.svg" alt="" aria-hidden="true" />
        <span class="cart-text">Cart</span>
      </a>

      <h1 class="site-title">The Wandering Photographer</h1>
    </header>

    <main id="content">
      <h2 class="sr-only">Available Prints</h2>

      <figure class="print-card">
        <img src="Media/OceanPhoto.jpg" alt="Two people sitting on white cliffs overlooking a calm blue ocean at sunset." />
        <figcaption class="caption">
          This was from a fabulous trip to the coast of Greenland with my family. The water was lovely—but very cold!
        </figcaption>
        <button class="add-button" type="button">
          Add <span class="sr-only">Greenland coast photo</span> to cart
        </button>
      </figure>

      <figure class="print-card">
        <img src="Media/BridgePhoto.jpg" alt="Low-angle view of the Golden Gate Bridge's red steel towers against a blue sky." />
        <figcaption class="caption">
          A picture of the Golden Gate Bridge. New York! New York!
        </figcaption>
        <button class="add-button" type="button">
          Add <span class="sr-only">Golden Gate Bridge photo</span> to cart
        </button>
      </figure>

      <figure class="print-card">
        <img src="Media/ValleyPhoto.jpg" alt="Wide river valley between mountains, shaped by a former glacier." />
        <figcaption class="caption">
          Another great photo from Greenland. It's a river valley where a glacier used to be.
        </figcaption>
        <button class="add-button" type="button">
          Add <span class="sr-only">Greenland valley photo</span> to cart
        </button>
      </figure>

      <figure class="print-card">
        <img src="Media/WaterfallPhoto.jpg" alt="Large waterfall cascading into a pool surrounded by moss-covered rocks." />
        <figcaption class="caption">
          The waterfall made such a lovely sound. I could have fallen asleep!
        </figcaption>
        <button class="add-button" type="button">
          Add <span class="sr-only">Waterfall photo</span> to cart
        </button>
      </figure>
    </main>

    <footer aria-label="Site footer">
      <p class="copyright">&copy; 2026 The Wandering Photographer</p>
      <nav aria-label="Footer Navigation">
        <ul class="footer-links">
          <li><a href="#">Home</a></li>
          <li><a href="#">Blog</a></li>
          <li><a href="#">About me</a></li>
        </ul>
      </nav>
    </footer>
  </div>
</body>
</html>
